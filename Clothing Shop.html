<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Clothing Shop</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

/* Navigation */
nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
}

/* Header animation */
header{
    background:#ff6600;
    color:white;
    padding:20px;
    text-align:center;
    animation: slide 2s;
}

@keyframes slide{
    from{opacity:0; transform:translateY(-50px);}
    to{opacity:1; transform:translateY(0);}
}

/* Product images */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.products img{
    width:200px;
    margin:10px;
    border-radius:10px;
}

/* Table styling */
table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

/* Responsive Design */
@media (max-width:600px){
    .products img{
        width:90%;
    }
}

button{
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

</style>

<script>
function showMessage(){
    alert("Welcome to our Clothing Shop!");
}
</script>

</head>

<body>

<header>
<h1>My Online Clothing Shop</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>
<a href="#">Contact</a>
<a href="https://www.google.com">Visit Google</a>
</nav>

<h2 style="text-align:center;">Product Categories</h2>

<ul style="width:200px; margin:auto;">
<li>T-Shirts</li>
<li>Jeans</li>
<li>Jackets</li>
<li>Shoes</li>
<li>Accessories</li>
</ul>

<h2 style="text-align:center;">Our Products</h2>

<div class="products">
<img src="images/img1.jpg" alt="Product 1">
<img src="images/img2.jpg" alt="Product 2">
<img src="images/img3.jpg" alt="Product 3">
<img src="images/img4.jpg" alt="Product 4">
<img src="images/img5.jpg" alt="Product 5">
</div>

<h2 style="text-align:center;">Price List</h2>

<table>
<tr>
<th>Product</th>
<th>Price</th>
<th>Availability</th>
</tr>

<tr>
<td>T-Shirt</td>
<td>Rs.1550</td>
<td>Available</td>
</tr>

<tr>
<td>Jeans</td>
<td>Rs.3000</td>
<td>Available</td>
</tr>

<tr>
<td>Jacket</td>
<td>Rs.4500</td>
<td>Limited Stock</td>
</tr>

</table>

<br><br>

<center>
<button onclick="showMessage()">Click for Welcome Message</button>
</center>

</body>
</html>
